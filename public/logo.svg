<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#2d6a8f"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)" stroke="#1a3a5c" stroke-width="2"/>
  <!-- Inner sandy circle -->
  <circle cx="100" cy="90" r="65" fill="#c8956c"/>
  <!-- Water wave -->
  <path d="M 5 130 Q 50 115 100 130 Q 150 145 195 130 L 195 170 Q 150 155 100 170 Q 50 185 5 170 Z" fill="#4db8d4" opacity="0.8"/>
  <path d="M 5 140 Q 50 125 100 140 Q 150 155 195 140 L 195 175 Q 150 160 100 175 Q 50 190 5 175 Z" fill="#87d4e8" opacity="0.6"/>
  <!-- Palm trees -->
  <rect x="75" y="65" width="6" height="55" fill="#7a4f2d" rx="2"/>
  <rect x="95" y="50" width="7" height="65" fill="#8b5e35" rx="2"/>
  <!-- Palm leaves -->
  <ellipse cx="72" cy="60" rx="20" ry="8" fill="#2d8a3e" transform="rotate(-30 72 60)"/>
  <ellipse cx="85" cy="55" rx="22" ry="8" fill="#3aa34e" transform="rotate(15 85 55)"/>
  <ellipse cx="68" cy="58" rx="18" ry="7" fill="#2d8a3e" transform="rotate(-60 68 58)"/>
  <ellipse cx="92" cy="45" rx="24" ry="8" fill="#2d8a3e" transform="rotate(-20 92 45)"/>
  <ellipse cx="107" cy="42" rx="22" ry="8" fill="#3aa34e" transform="rotate(25 107 42)"/>
  <ellipse cx="100" cy="48" rx="20" ry="7" fill="#2d8a3e" transform="rotate(-50 100 48)"/>
  <!-- Outer ring decoration -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1a3a5c" stroke-width="8"/>
  <!-- Text SARAU LUXURY -->
  <text x="100" y="195" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#4db8d4" text-anchor="middle" letter-spacing="3">SARAU LUXURY</text>
</svg>