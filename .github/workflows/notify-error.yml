name: Notify on Build Error

on:
  workflow_run:
    workflows: ["Vercel Production Deployment"]
    types:
      - completed

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send WhatsApp notification via Fonnte
        run: |
          COMMIT_MSG="${{ github.event.workflow_run.head_commit.message }}"
          COMMIT_SHA="${{ github.event.workflow_run.head_sha }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          
          MESSAGE="❌ *VERCEL BUILD GAGAL*%0A%0A*Repo:* sarau-luxury-claude%0A*Commit:* ${COMMIT_SHA:0:7}%0A*Pesan:* ${COMMIT_MSG}%0A%0A*Link Log:*%0A${RUN_URL}"
          
          curl -s -X POST "https://api.fonnte.com/send" \
            -H "Authorization: ${{ secrets.FONNTE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"target\": \"${{ secrets.NOTIFY_PHONE }}\", \"message\": \"${MESSAGE}\"}"
